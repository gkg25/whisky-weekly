name: Whisky Weekly

on:
  schedule:
    # 毎週月曜 07:00 JST = 日曜 22:00 UTC
    - cron: '0 22 * * 0'
  workflow_dispatch:
    inputs:
      from_date:
        description: '開始日 YYYY-MM-DD（空欄なら7日前）'
        required: false
        default: ''
      to_date:
        description: '終了日 YYYY-MM-DD（空欄なら本日）'
        required: false
        default: ''
      summarize_limit:
        description: 'Gemini 要約最大記事数'
        required: false
        default: '80'

permissions:
  contents: write

jobs:
  generate-and-send:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Determine date range
        id: dates
        run: |
          FROM_INPUT="${{ inputs.from_date }}"
          TO_INPUT="${{ inputs.to_date }}"
          if [ -z "$FROM_INPUT" ]; then
            FROM_DATE=$(date -u -d "7 days ago" -I)
          else
            FROM_DATE="$FROM_INPUT"
          fi
          if [ -z "$TO_INPUT" ]; then
            TO_DATE=$(date -u -I)
          else
            TO_DATE="$TO_INPUT"
          fi
          echo "from_date=$FROM_DATE" >> "$GITHUB_OUTPUT"
          echo "to_date=$TO_DATE" >> "$GITHUB_OUTPUT"
          echo "Computed date range: $FROM_DATE ~ $TO_DATE"

      - name: Run pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-2.5-flash-lite' }}
        run: |
          python -m src.main \
            --from "${{ steps.dates.outputs.from_date }}" \
            --to "${{ steps.dates.outputs.to_date }}" \
            --summarize-limit "${{ inputs.summarize_limit || '80' }}" \
            --send

      - name: Commit issue counter
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add data/issue_counter.json data/seen_urls.json
          if git diff --staged --quiet; then
            echo "Nothing to commit"
          else
            git commit -m 'chore: update issue counter and seen_urls [skip ci]'
            git push
          fi

      - name: Upload PDF artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: whisky-weekly-pdf-${{ steps.dates.outputs.from_date }}_${{ steps.dates.outputs.to_date }}
          path: output/*.pdf
          retention-days: 30

      - name: Upload summary JSON artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: summary-json-${{ steps.dates.outputs.from_date }}_${{ steps.dates.outputs.to_date }}
          path: output/summary_*.json
          retention-days: 14
